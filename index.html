<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Style - Каталог</title>
    <link rel="stylesheet" href="styles/main.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 10h.01M15 10h.01M12 2a8 8 0 0 1 8 8v12l-3-3-2.5 2.5L12 19l-2.5 2.5L7 19l-3 3V10a8 8 0 0 1 8-8z"/>
                </svg>
                <span class="logo-text">GHOST STYLE</span>
            </div>
            <div class="header-actions">
                <button class="header-btn" aria-label="Поиск">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/>
                        <path d="m21 21-4.35-4.35"/>
                    </svg>
                </button>
                <button class="header-btn" aria-label="Корзина">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
                        <line x1="3" y1="6" x2="21" y2="6"/>
                        <path d="M16 10a4 4 0 0 1-8 0"/>
                    </svg>
                    <span class="cart-badge">3</span>
                </button>
            </div>
        </header>

        <!-- Content -->
        <main class="content">
            <div class="section-header">
                <h2>Каталог</h2>
                <p class="section-subtitle">Стильная одежда на каждый день</p>
            </div>
            <div class="product-grid">
                <div class="product-card">
                    <div class="product-image">
                        <svg viewBox="0 0 80 80" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M25 30h30M30 30V20h20v10M20 30h40v35H20V30z"/>
                        </svg>
                    </div>
                    <h3>Футболка Ghost</h3>
                    <p class="price">2 990</p>
                </div>
                <div class="product-card">
                    <div class="product-image">
                        <svg viewBox="0 0 80 80" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M22 25l8-10h20l8 10M20 25h40v40H20V25z"/>
                        </svg>
                    </div>
                    <h3>Худи Style</h3>
                    <p class="price">4 990</p>
                </div>
                <div class="product-card">
                    <div class="product-image">
                        <svg viewBox="0 0 80 80" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M25 20h30M20 20v10M60 20v10M20 30v35h40V30H20z"/>
                        </svg>
                    </div>
                    <h3>Джинсы Dark</h3>
                    <p class="price">3 990</p>
                </div>
                <div class="product-card">
                    <div class="product-image">
                        <svg viewBox="0 0 80 80" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M20 35l20-15 20 15M20 35h40v25H20V35z"/>
                        </svg>
                    </div>
                    <h3>Кепка Ghost</h3>
                    <p class="price">1 490</p>
                </div>
                <div class="product-card">
                    <div class="product-image">
                        <svg viewBox="0 0 80 80" fill="none" stroke="currentColor" stroke-width="1.5">
                            <rect x="20" y="20" width="40" height="45" rx="3"/>
                            <path d="M20 35h40M35 35v30"/>
                        </svg>
                    </div>
                    <h3>Рубашка Classic</h3>
                    <p class="price">3 490</p>
                </div>
                <div class="product-card">
                    <div class="product-image">
                        <svg viewBox="0 0 80 80" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M25 25c0-8 6-15 15-15s15 7 15 15M20 25h40v40H20V25z"/>
                        </svg>
                    </div>
                    <h3>Свитер Warm</h3>
                    <p class="price">4 290</p>
                </div>
            </div>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <a href="index.html" class="nav-btn active">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                    <path d="M9 22V12h6v10"/>
                </svg>
                <span>Каталог</span>
            </a>
            <a href="new.html" class="nav-btn">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                </svg>
                <span>Новинки</span>
            </a>
            <a href="account.html" class="nav-btn">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                </svg>
                <span>Аккаунт</span>
            </a>
            <a href="settings.html" class="nav-btn">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                </svg>
                <span>Настройки</span>
            </a>
        </nav>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
